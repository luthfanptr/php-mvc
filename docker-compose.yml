version: "3.9"

services:

  php:
    image: php:8.5.4-apache
    container_name: mvc

    ports:
      - "8080:80"

    volumes:
      - ./src:/var/www/html

    working_dir: /var/www/html

    command: >
      bash -c "
      a2enmod rewrite &&
      sed -i 's/AllowOverride None/AllowOverride All/g' /etc/apache2/apache2.conf &&
      apache2-foreground
      "